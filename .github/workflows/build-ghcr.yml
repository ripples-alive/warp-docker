name: Build And Publish GHCR Image

env:
  IMAGE_NAME: warp

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  schedule:
    # Rebuild latest images daily to pick up upstream latest base images and packages.
    - cron: "45 4 * * *"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: microsocks
            target: microsocks-runtime
          - variant: gost
            target: gost-runtime

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Prepare Image Tags
        id: prep
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VARIANT: ${{ matrix.variant }}
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_name="ghcr.io/${owner}/${IMAGE_NAME}"
          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          tags=""

          add_tag() {
            if [ -z "$tags" ]; then
              tags="${image_name}:$1"
            else
              tags="$(printf '%s\n%s:%s' "$tags" "$image_name" "$1")"
            fi
          }

          case "$VARIANT" in
            microsocks)
              add_tag "sha-${short_sha}"
              if [ "${GITHUB_REF_TYPE:-}" = "branch" ] && [ "$GITHUB_REF_NAME" = "$DEFAULT_BRANCH" ]; then
                add_tag "latest"
                add_tag "microsocks"
              elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
                add_tag "${GITHUB_REF_NAME}"
                add_tag "${GITHUB_REF_NAME}-microsocks"
              fi
              ;;
            gost)
              add_tag "sha-${short_sha}-gost"
              if [ "${GITHUB_REF_TYPE:-}" = "branch" ] && [ "$GITHUB_REF_NAME" = "$DEFAULT_BRANCH" ]; then
                add_tag "gost"
              elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
                add_tag "${GITHUB_REF_NAME}-gost"
              fi
              ;;
            *)
              printf 'unsupported variant: %s\n' "$VARIANT" >&2
              exit 1
              ;;
          esac

          echo "image_name=${image_name}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            printf '%s\n' "$tags"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          pull: true
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
